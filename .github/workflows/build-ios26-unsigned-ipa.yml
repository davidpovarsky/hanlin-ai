name: Build iOS 26 Unsigned IPA

on:
  workflow_dispatch:
    inputs:
      runtime_bundle_only:
        description: Validate and publish the pinned RuntimeCore bundle without building the app
        required: true
        default: false
        type: boolean
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-runtime-bundle:
    if: ${{ inputs.runtime_bundle_only }}
    name: Run split RuntimeCore bundle pipeline
    uses: ./.github/workflows/build-runtime-bundle.yml
    with:
      publish_release: true
      force_rebuild: false
    permissions:
      actions: read
      contents: write

  build-ios26-unsigned-ipa:
    if: ${{ !inputs.runtime_bundle_only }}
    name: Build unsigned IPA with Xcode 26
    runs-on: macos-26
    timeout-minutes: 60

    env:
      PROJECT_PATH: AI_HLY.xcodeproj
      SCHEME_NAME: AI_HLY
      APP_NAME: AI_Hanlin
      CONFIGURATION: Release
      DERIVED_DATA_PATH: build/DerivedData
      CLONED_PACKAGES_PATH: build/SourcePackages
      LOG_DIR: build-logs
      IPA_NAME: AI_Hanlin-iOS26-unsigned.ipa
      IOS_DEPLOYMENT_TARGET: "26.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare log folders
        run: |
          set -euxo pipefail
          mkdir -p "$LOG_DIR"
          mkdir -p build
          echo "Log folder prepared at: $LOG_DIR" | tee "$LOG_DIR/00-prepare.log"

      - name: Show runner and Xcode environment
        run: |
          set -euxo pipefail

          {
            echo "===== Date ====="
            date

            echo
            echo "===== macOS ====="
            sw_vers

            echo
            echo "===== Kernel ====="
            uname -a

            echo
            echo "===== Current Xcode ====="
            xcode-select -p || true
            xcodebuild -version || true

            echo
            echo "===== Installed Xcodes ====="
            ls -la /Applications | grep -E "Xcode" || true

            echo
            echo "===== Available SDKs ====="
            xcodebuild -showsdks || true

            echo
            echo "===== Repository root ====="
            pwd
            ls -la

            echo
            echo "===== Top-level files ====="
            find . -maxdepth 3 -type f | sort | sed -n '1,400{s#^\./##;p;}'
          } 2>&1 | tee "$LOG_DIR/01-environment.log"

      - name: Select Xcode 26
        run: |
          set -euxo pipefail

          {
            echo "Trying to select the newest available Xcode 26..."

            if [ -d "/Applications/Xcode_26.6.app" ]; then
              sudo xcode-select -s /Applications/Xcode_26.6.app/Contents/Developer
              echo "Selected Xcode 26.6"
            elif [ -d "/Applications/Xcode_26.5.app" ]; then
              sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
              echo "Selected Xcode 26.5"
            elif [ -d "/Applications/Xcode_26.4.1.app" ]; then
              sudo xcode-select -s /Applications/Xcode_26.4.1.app/Contents/Developer
              echo "Selected Xcode 26.4.1"
            elif [ -d "/Applications/Xcode_26.4.app" ]; then
              sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
              echo "Selected Xcode 26.4"
            elif [ -d "/Applications/Xcode_26.3.app" ]; then
              sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
              echo "Selected Xcode 26.3"
            elif [ -d "/Applications/Xcode_26.2.app" ]; then
              sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
              echo "Selected Xcode 26.2"
            elif [ -d "/Applications/Xcode_26.1.1.app" ]; then
              sudo xcode-select -s /Applications/Xcode_26.1.1.app/Contents/Developer
              echo "Selected Xcode 26.1.1"
            elif [ -d "/Applications/Xcode_26.0.1.app" ]; then
              sudo xcode-select -s /Applications/Xcode_26.0.1.app/Contents/Developer
              echo "Selected Xcode 26.0.1"
            else
              echo "ERROR: No Xcode 26 installation found on this runner."
              echo "Available Xcodes:"
              ls -la /Applications | grep -E "Xcode" || true
              exit 1
            fi

            echo
            echo "===== Selected developer dir ====="
            xcode-select -p

            echo
            echo "===== Selected Xcode version ====="
            xcodebuild -version

            echo
            echo "===== SDKs after selection ====="
            xcodebuild -showsdks

            echo
            echo "===== iOS SDK check ====="
            xcodebuild -showsdks | grep -E "iphoneos26|iOS 26" || {
              echo "ERROR: Xcode 26 selected, but iOS 26 SDK was not found."
              exit 1
            }
          } 2>&1 | tee "$LOG_DIR/02-select-xcode26.log"

      - name: Create CI Config.xcconfig
        run: |
          set -euxo pipefail

          {
            echo "Creating minimal Config.xcconfig for CI."
            echo "The repository ignores Config.xcconfig, so CI must generate it."

            cat > Config.xcconfig <<'EOF'
          // Generated by GitHub Actions for CI builds.
          // Do not commit secrets here.

          HANLIN_API_KEY =
          HANLIN_OPEN_API_KEY =
          EOF

            echo
            echo "===== Config.xcconfig ====="
            cat Config.xcconfig
          } 2>&1 | tee "$LOG_DIR/03-create-config-xcconfig.log"

      - name: Prepare verified embedded RuntimeCore
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          bash Scripts/Runtime/prepare-runtime-core.sh 2>&1 | tee "$LOG_DIR/04-prepare-runtime-core.log"

      - name: Validate expected project files
        run: |
          set -euxo pipefail

          {
            echo "Validating expected project structure..."

            test -d "$PROJECT_PATH"
            test -f "$PROJECT_PATH/project.pbxproj"
            test -d "AI_HLY"
            test -f "AI_HLY/AI_HLY.swift"
            test -f "AI_HLY/AI_HLY.entitlements"
            test -f "AI-HLY-Info.plist"
            test -f "Config.xcconfig"
            test -d "Vendor/NodeMobile/NodeMobile.xcframework"
            test -d "Vendor/Python/Python.xcframework"
            test -f "Vendor/Python/Python-VERSIONS"
            test -f "AI_HLY/RuntimeHostResources.zip"
            test -f "AI_HLY/Downstream/RuntimeCore/Resources/RuntimeManifest.json"

            echo
            echo "Required files exist."

            echo
            echo "===== Project directory ====="
            find "$PROJECT_PATH" -maxdepth 4 -type f | sort

            echo
            echo "===== App source sample ====="
            find AI_HLY -maxdepth 3 -type f | sort | sed -n '1,200p'
          } 2>&1 | tee "$LOG_DIR/04-validate-project.log"

      - name: Inspect Xcode project
        run: |
          set -euxo pipefail

          {
            echo "Running xcodebuild -list..."
            xcodebuild -list -project "$PROJECT_PATH"

            echo
            echo "Checking project settings by scheme..."
            xcodebuild \
              -project "$PROJECT_PATH" \
              -scheme "$SCHEME_NAME" \
              -configuration "$CONFIGURATION" \
              -showBuildSettings \
              IPHONEOS_DEPLOYMENT_TARGET="$IOS_DEPLOYMENT_TARGET" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              | tee "$LOG_DIR/05-build-settings-full.log"

          } 2>&1 | tee "$LOG_DIR/05-inspect-project.log"

      - name: Resolve Swift Package dependencies
        run: |
          set -euxo pipefail

          {
            echo "Resolving Swift Package dependencies..."

            xcodebuild \
              -project "$PROJECT_PATH" \
              -scheme "$SCHEME_NAME" \
              -resolvePackageDependencies \
              -clonedSourcePackagesDirPath "$CLONED_PACKAGES_PATH" \
              -skipPackagePluginValidation \
              -skipMacroValidation

            echo
            echo "===== Resolved packages folder ====="
            find "$CLONED_PACKAGES_PATH" -maxdepth 4 -type d | sort | sed -n '1,300p' || true

            echo
            echo "Swift Package dependency resolution completed."
          } 2>&1 | tee "$LOG_DIR/06-resolve-packages.log"

      - name: Build unsigned iOS 26 app
        run: |
          set -euxo pipefail

          {
            echo "Starting unsigned iOS build..."
            echo "Project: $PROJECT_PATH"
            echo "Scheme: $SCHEME_NAME"
            echo "App name: $APP_NAME"
            echo "Configuration: $CONFIGURATION"
            echo "Deployment target override: iOS $IOS_DEPLOYMENT_TARGET"
            echo "DerivedData: $DERIVED_DATA_PATH"
            echo "Packages: $CLONED_PACKAGES_PATH"
            echo

            rm -rf "$LOG_DIR/BuildResult.xcresult"

            xcodebuild \
              -project "$PROJECT_PATH" \
              -scheme "$SCHEME_NAME" \
              -configuration "$CONFIGURATION" \
              -sdk iphoneos \
              -destination "generic/platform=iOS" \
              -derivedDataPath "$DERIVED_DATA_PATH" \
              -clonedSourcePackagesDirPath "$CLONED_PACKAGES_PATH" \
              -resultBundlePath "$LOG_DIR/BuildResult.xcresult" \
              -skipPackagePluginValidation \
              -skipMacroValidation \
              IPHONEOS_DEPLOYMENT_TARGET="$IOS_DEPLOYMENT_TARGET" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              PROVISIONING_PROFILE_SPECIFIER="" \
              DEVELOPMENT_TEAM="" \
              clean build 2>&1 | tee "$LOG_DIR/07-xcodebuild.raw.log"

            echo
            echo "Build command completed."
          } 2>&1 | tee "$LOG_DIR/07-build-step-wrapper.log"

      - name: Locate built app
        run: |
          set -euxo pipefail

          {
            echo "Searching for built .app products..."

            find "$DERIVED_DATA_PATH" -name "*.app" -type d -print | sort | tee "$LOG_DIR/08-found-apps.txt"

            APP_PATH="$(find "$DERIVED_DATA_PATH/Build/Products" -path "*Release-iphoneos/*.app" -type d -print -quit || true)"

            if [ -z "$APP_PATH" ]; then
              echo "ERROR: No Release-iphoneos .app found."
              echo
              echo "Directory dump:"
              find "$DERIVED_DATA_PATH/Build/Products" -maxdepth 5 -print || true
              exit 1
            fi

            echo "$APP_PATH" > "$LOG_DIR/app-path.txt"

            echo
            echo "Selected app path:"
            cat "$LOG_DIR/app-path.txt"

            echo
            echo "===== App bundle contents ====="
            find "$APP_PATH" -maxdepth 3 -print | sort | sed -n '1,400p'

            echo
            echo "===== App Info.plist ====="
            /usr/libexec/PlistBuddy -c "Print" "$APP_PATH/Info.plist" || true

            echo
            echo "===== Bundle metadata ====="
            echo "CFBundleIdentifier:"
            /usr/libexec/PlistBuddy -c "Print CFBundleIdentifier" "$APP_PATH/Info.plist" || true

            echo "CFBundleShortVersionString:"
            /usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "$APP_PATH/Info.plist" || true

            echo "CFBundleVersion:"
            /usr/libexec/PlistBuddy -c "Print CFBundleVersion" "$APP_PATH/Info.plist" || true

            echo "MinimumOSVersion:"
            /usr/libexec/PlistBuddy -c "Print MinimumOSVersion" "$APP_PATH/Info.plist" || true

          } 2>&1 | tee "$LOG_DIR/08-locate-app.log"

      - name: Package unsigned IPA
        run: |
          set -euxo pipefail

          {
            APP_PATH="$(cat "$LOG_DIR/app-path.txt")"

            echo "Packaging unsigned IPA..."
            echo "App path: $APP_PATH"

            rm -rf Payload
            mkdir -p Payload

            cp -R "$APP_PATH" Payload/

            echo
            echo "===== Payload contents ====="
            find Payload -maxdepth 4 -print | sort | sed -n '1,400p'

            echo
            echo "Creating IPA: $IPA_NAME"
            /usr/bin/zip -qry "$IPA_NAME" Payload

            echo
            echo "===== IPA file ====="
            ls -lh "$IPA_NAME"

            echo
            echo "===== IPA zip listing sample ====="
            unzip -l "$IPA_NAME" | sed -n '1,200p'

            echo
            echo "Unsigned IPA packaged successfully."
          } 2>&1 | tee "$LOG_DIR/09-package-ipa.log"

      - name: Create diagnostic summary
        if: always()
        run: |
          set +e

          SUMMARY_FILE="$LOG_DIR/00-summary.txt"

          {
            echo "===== Build diagnostic summary ====="
            echo "Date: $(date)"
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Commit: $GITHUB_SHA"
            echo "Runner OS: $RUNNER_OS"
            echo "Runner name: $RUNNER_NAME"

            echo
            echo "===== Selected Xcode ====="
            xcode-select -p
            xcodebuild -version

            echo
            echo "===== SDKs ====="
            xcodebuild -showsdks

            echo
            echo "===== Project ====="
            echo "PROJECT_PATH=$PROJECT_PATH"
            echo "SCHEME_NAME=$SCHEME_NAME"
            echo "APP_NAME=$APP_NAME"
            echo "CONFIGURATION=$CONFIGURATION"
            echo "IOS_DEPLOYMENT_TARGET=$IOS_DEPLOYMENT_TARGET"

            echo
            echo "===== IPA ====="
            if [ -f "$IPA_NAME" ]; then
              ls -lh "$IPA_NAME"
            else
              echo "IPA was not created."
            fi

            echo
            echo "===== Found apps ====="
            cat "$LOG_DIR/08-found-apps.txt" 2>/dev/null || echo "No found-apps file."

            echo
            echo "===== Last 200 lines of raw xcodebuild log ====="
            tail -200 "$LOG_DIR/07-xcodebuild.raw.log" 2>/dev/null || echo "No raw xcodebuild log."

          } > "$SUMMARY_FILE" 2>&1

          cat "$SUMMARY_FILE"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI_Hanlin-iOS26-unsigned-ipa
          path: AI_Hanlin-iOS26-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload build logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AI_Hanlin-iOS26-build-logs
          path: |
            build-logs
          if-no-files-found: warn
          retention-days: 14
