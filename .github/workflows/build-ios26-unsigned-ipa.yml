name: Build iOS 26 Unsigned IPA

on:
  workflow_dispatch:
    inputs:
      runtime_bundle_only:
        description: Validate and publish the pinned RuntimeCore bundle without building the app
        required: true
        default: false
        type: boolean
      phase1_validation_only:
        description: Validate the Phase 0 baseline and Phase 1 contracts without building the app
        required: true
        default: false
        type: boolean
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-hanlin-platform-phase1:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.phase1_validation_only && !inputs.runtime_bundle_only }}
    name: Validate baseline, contracts, tests, and iOS compilation
    runs-on: macos-26
    timeout-minutes: 60

    env:
      BASELINE_ID: scripting-compat-2026-07-22-8d7d33d9369e
      BASELINE_SHA256: 8d7d33d9369ee555d15adf10c867abbfb85834eced7e7596a627b70ff627ff36
      BASELINE_FILES: "999"
      BASELINE_BYTES: "5918732"
      EXPECTED_FIXTURES: "177"
      PACKAGE_PATH: Packages/HanlinPlatform
      LOG_DIR: ${{ runner.temp }}/phase1-validation-logs

    steps:
      - name: Select newest stable Xcode 26 and print environment
        run: |
          set -euxo pipefail
          mkdir -p "$LOG_DIR"
          {
            selected_xcode="$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' -print \
              | grep -E '/Xcode_26([._][0-9]+)*\.app$' \
              | sort -V \
              | tail -1)"
            test -n "$selected_xcode"
            sudo xcode-select -s "$selected_xcode/Contents/Developer"
            sw_vers
            xcodebuild -version
            xcode-select -p
            swift --version
            xcodebuild -showsdks
            xcodebuild -showsdks | grep -E 'iphoneos26|iOS 26'
            xcodebuild -showsdks | grep -E 'iphonesimulator26|iOS Simulator 26'
          } 2>&1 | tee "$LOG_DIR/00-environment.log"

      - name: Check out exact validation commit cleanly
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1
          ref: ${{ github.sha }}

      - name: Confirm clean exact checkout
        run: |
          set -euxo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test -z "$(git status --porcelain)"
          git rev-parse HEAD

      - name: Set up pinned baseline Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.5.0

      - name: Prepare validation logs
        run: mkdir -p "$LOG_DIR" build

      - name: Verify Scripting baseline integrity and reproducibility
        run: |
          set -euxo pipefail
          {
            node Scripts/ScriptingReference/verify-scripting-reference.mjs
            node Scripts/ScriptingReference/build-scripting-inventory.mjs --check
            node Scripts/ScriptingReference/validate-scripting-examples.mjs
            node --input-type=module <<'NODE'
          import { readFile } from "node:fs/promises";

          const baseline = JSON.parse(
            await readFile("Reference/ScriptingCompatibility/BASELINE.json", "utf8"),
          );
          const sums = JSON.parse(
            await readFile(
              "Reference/ScriptingCompatibility/SHA256SUMS.json",
              "utf8",
            ),
          );
          const examples = JSON.parse(
            await readFile(
              "Reference/ScriptingCompatibility/Generated/example-index.json",
              "utf8",
            ),
          );
          const expected = {
            id: process.env.BASELINE_ID,
            sha256: process.env.BASELINE_SHA256,
            files: Number(process.env.BASELINE_FILES),
            bytes: Number(process.env.BASELINE_BYTES),
            fixtures: Number(process.env.EXPECTED_FIXTURES),
          };
          const actual = {
            id: baseline.baselineID,
            sha256: baseline.aggregateSHA256,
            files: sums.files.length,
            bytes: sums.files.reduce((total, file) => total + file.bytes, 0),
            fixtures: examples.examples.length,
          };
          for (const key of Object.keys(expected)) {
            if (actual[key] !== expected[key]) {
              throw new Error(
                `${key}: expected ${expected[key]}, received ${actual[key]}`,
              );
            }
          }
          console.log(JSON.stringify(actual, null, 2));
          NODE
            node Scripts/ScriptingReference/build-scripting-inventory.mjs
            git diff --exit-code -- Reference/ScriptingCompatibility
          } 2>&1 | tee "$LOG_DIR/01-scripting-baseline.log"

      - name: Validate JSON and internal JSON Schema references
        run: |
          set -euxo pipefail
          node Scripts/ScriptingReference/validate-json-and-schema.mjs \
            2>&1 | tee "$LOG_DIR/02-json-schema.log"

      - name: Resolve the Phase 1 Swift package
        run: |
          set -euxo pipefail
          swift package --package-path "$PACKAGE_PATH" resolve \
            2>&1 | tee "$LOG_DIR/03-swift-package-resolve.log"

      - name: Compile the Phase 1 Swift package
        run: |
          set -euxo pipefail
          swift build --package-path "$PACKAGE_PATH" \
            2>&1 | tee "$LOG_DIR/04-swift-build.log"

      - name: Compile and execute all Phase 1 contract tests
        run: |
          set -euxo pipefail
          swift test --package-path "$PACKAGE_PATH" --parallel \
            2>&1 | tee "$LOG_DIR/05-swift-test.log"

      - name: Compile contracts for generic iOS Simulator
        working-directory: Packages/HanlinPlatform
        run: |
          set -euxo pipefail
          rm -rf \
            "$GITHUB_WORKSPACE/build/Phase1SimulatorDerivedData" \
            "$LOG_DIR/Phase1Simulator.xcresult"
          xcodebuild \
            -scheme HanlinPlatformContracts \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$GITHUB_WORKSPACE/build/Phase1SimulatorDerivedData" \
            -resultBundlePath "$LOG_DIR/Phase1Simulator.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_STRICT_CONCURRENCY=complete \
            clean build 2>&1 | tee "$LOG_DIR/06-ios-simulator.log"

      - name: Compile contracts for generic iOS device
        working-directory: Packages/HanlinPlatform
        run: |
          set -euxo pipefail
          rm -rf \
            "$GITHUB_WORKSPACE/build/Phase1DeviceDerivedData" \
            "$LOG_DIR/Phase1Device.xcresult"
          xcodebuild \
            -scheme HanlinPlatformContracts \
            -configuration Debug \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$GITHUB_WORKSPACE/build/Phase1DeviceDerivedData" \
            -resultBundlePath "$LOG_DIR/Phase1Device.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_STRICT_CONCURRENCY=complete \
            clean build 2>&1 | tee "$LOG_DIR/07-ios-device.log"

      - name: Summarize compiler warnings
        if: always()
        run: |
          set -uo pipefail
          {
            echo "Compiler warnings retained for review:"
            grep -RIn --include='*.log' 'warning:' "$LOG_DIR" || true
          } | tee "$LOG_DIR/08-warnings.log"

      - name: Retain Phase 1 validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase1-validation-${{ github.sha }}
          path: ${{ runner.temp }}/phase1-validation-logs
          if-no-files-found: error
          retention-days: 30

  validate-runtime-bundle:
    if: ${{ inputs.runtime_bundle_only && !inputs.phase1_validation_only }}
    name: Run split RuntimeCore bundle pipeline
    uses: ./.github/workflows/build-runtime-bundle.yml
    with:
      publish_release: true
      force_rebuild: false
    permissions:
      actions: read
      contents: write

  build-ios26-unsigned-ipa:
    if: ${{ !inputs.runtime_bundle_only && !inputs.phase1_validation_only }}
    name: Build unsigned IPA with Xcode 26
    runs-on: macos-26
    timeout-minutes: 60

    env:
      PROJECT_PATH: AI_HLY.xcodeproj
      SCHEME_NAME: AI_HLY
      APP_NAME: AI_Hanlin
      CONFIGURATION: Release
      DERIVED_DATA_PATH: build/DerivedData
      CLONED_PACKAGES_PATH: build/SourcePackages
      LOG_DIR: build-logs
      IPA_NAME: AI_Hanlin-iOS26-unsigned.ipa
      IOS_DEPLOYMENT_TARGET: "26.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pinned RuntimeCore host Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.5.0
          cache: npm
          cache-dependency-path: AI_HLY/Downstream/RuntimeCore/Node/Host/package-lock.json

      - name: Prepare log folders
        run: |
          set -euxo pipefail
          mkdir -p "$LOG_DIR"
          mkdir -p build
          echo "Log folder prepared at: $LOG_DIR" | tee "$LOG_DIR/00-prepare.log"

      - name: Show runner and Xcode environment
        run: |
          set -euxo pipefail

          {
            echo "===== Date ====="
            date

            echo
            echo "===== macOS ====="
            sw_vers

            echo
            echo "===== Kernel ====="
            uname -a

            echo
            echo "===== Current Xcode ====="
            xcode-select -p || true
            xcodebuild -version || true

            echo
            echo "===== Installed Xcodes ====="
            ls -la /Applications | grep -E "Xcode" || true

            echo
            echo "===== Available SDKs ====="
            xcodebuild -showsdks || true

            echo
            echo "===== Repository root ====="
            pwd
            ls -la

            echo
            echo "===== Top-level files ====="
            find . -maxdepth 3 -type f | sort | sed -n '1,400{s#^\./##;p;}'
          } 2>&1 | tee "$LOG_DIR/01-environment.log"

      - name: Select Xcode 26
        run: |
          set -euxo pipefail

          {
            echo "Trying to select the newest available Xcode 26..."

            if [ -d "/Applications/Xcode_26.6.app" ]; then
              sudo xcode-select -s /Applications/Xcode_26.6.app/Contents/Developer
              echo "Selected Xcode 26.6"
            elif [ -d "/Applications/Xcode_26.5.app" ]; then
              sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
              echo "Selected Xcode 26.5"
            elif [ -d "/Applications/Xcode_26.4.1.app" ]; then
              sudo xcode-select -s /Applications/Xcode_26.4.1.app/Contents/Developer
              echo "Selected Xcode 26.4.1"
            elif [ -d "/Applications/Xcode_26.4.app" ]; then
              sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
              echo "Selected Xcode 26.4"
            elif [ -d "/Applications/Xcode_26.3.app" ]; then
              sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
              echo "Selected Xcode 26.3"
            elif [ -d "/Applications/Xcode_26.2.app" ]; then
              sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
              echo "Selected Xcode 26.2"
            elif [ -d "/Applications/Xcode_26.1.1.app" ]; then
              sudo xcode-select -s /Applications/Xcode_26.1.1.app/Contents/Developer
              echo "Selected Xcode 26.1.1"
            elif [ -d "/Applications/Xcode_26.0.1.app" ]; then
              sudo xcode-select -s /Applications/Xcode_26.0.1.app/Contents/Developer
              echo "Selected Xcode 26.0.1"
            else
              echo "ERROR: No Xcode 26 installation found on this runner."
              echo "Available Xcodes:"
              ls -la /Applications | grep -E "Xcode" || true
              exit 1
            fi

            echo
            echo "===== Selected developer dir ====="
            xcode-select -p

            echo
            echo "===== Selected Xcode version ====="
            xcodebuild -version

            echo
            echo "===== SDKs after selection ====="
            xcodebuild -showsdks

            echo
            echo "===== iOS SDK check ====="
            xcodebuild -showsdks | grep -E "iphoneos26|iOS 26" || {
              echo "ERROR: Xcode 26 selected, but iOS 26 SDK was not found."
              exit 1
            }
          } 2>&1 | tee "$LOG_DIR/02-select-xcode26.log"

      - name: Create CI Config.xcconfig
        run: |
          set -euxo pipefail

          {
            echo "Creating minimal Config.xcconfig for CI."
            echo "The repository ignores Config.xcconfig, so CI must generate it."

            cat > Config.xcconfig <<'EOF'
          // Generated by GitHub Actions for CI builds.
          // Do not commit secrets here.

          HANLIN_API_KEY =
          HANLIN_OPEN_API_KEY =
          EOF

            echo
            echo "===== Config.xcconfig ====="
            cat Config.xcconfig
          } 2>&1 | tee "$LOG_DIR/03-create-config-xcconfig.log"

      - name: Prepare verified embedded RuntimeCore
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          bash Scripts/Runtime/prepare-runtime-core.sh 2>&1 | tee "$LOG_DIR/04-prepare-runtime-core.log"
          grep -Fq "Prepared verified RuntimeCore 7d967563db0809a4efa0f07b75d6b5928379a3b6f3aafb886899a79f59512a93" "$LOG_DIR/04-prepare-runtime-core.log"

      - name: Verify MCP host on pinned Node 24.5.0
        run: |
          set -euxo pipefail
          test "$(node --version)" = "v24.5.0"
          verification_root="$(mktemp -d "$RUNNER_TEMP/mcp-host-verification.XXXXXX")"
          trap 'rm -rf "$verification_root"' EXIT
          cp -R AI_HLY/Downstream/RuntimeCore/Node/Host/. "$verification_root/"
          npm ci --ignore-scripts --no-audit --no-fund --prefix "$verification_root" \
            2>&1 | tee "$LOG_DIR/04-mcp-host-npm-ci.log"
          npm test --prefix "$verification_root" \
            2>&1 | tee "$LOG_DIR/04-mcp-host-tests.log"
          npm run test:integration --prefix "$verification_root" \
            2>&1 | tee "$LOG_DIR/04-mcp-server-everything-integration.log"
          node Scripts/Runtime/validate-mcp-install-dedup.mjs \
            2>&1 | tee "$LOG_DIR/04-mcp-install-dedup.log"

      - name: Package current RuntimeCore host resources
        run: |
          set -euxo pipefail
          bash Scripts/Runtime/prepare-runtime-host.sh 2>&1 | tee "$LOG_DIR/04-package-runtime-host.log"
          cp build/runtime-host/RuntimeHostResources.zip AI_HLY/RuntimeHostResources.zip
          unzip -Z1 AI_HLY/RuntimeHostResources.zip | grep -Fx 'runtime-probe.mjs'
          unzip -p AI_HLY/RuntimeHostResources.zip server-worker.mjs | grep -F 'registerHooks'
          unzip -p AI_HLY/RuntimeHostResources.zip package-compatibility.mjs | grep -F 'inspectArchiveSafety'

      - name: Run RuntimeCore fast preflight
        run: |
          set -euxo pipefail
          bash Scripts/Runtime/preflight-runtime-core.sh 2>&1 | tee "$LOG_DIR/04-runtime-preflight.log"

      - name: Confirm native RuntimeCore reuse
        run: |
          set -euxo pipefail
          test "$(node Scripts/Runtime/compute-runtime-dependency-hash.mjs RuntimeDependencies.lock.json)" = \
            "7d967563db0809a4efa0f07b75d6b5928379a3b6f3aafb886899a79f59512a93"
          git diff --exit-code -- RuntimeDependencies.lock.json
          if grep -E '(configure|cmake|ninja|make).*(Node|nodejs|V8|Python)' \
            "$LOG_DIR/04-prepare-runtime-core.log" "$LOG_DIR/04-package-runtime-host.log"; then
            echo "Native Node/V8/Python source compilation was detected unexpectedly." >&2
            exit 1
          fi
          echo "Reused verified native RuntimeCore; no Node, V8, or Python source compilation was detected."

      - name: Run RuntimeCore link-closure regression tests
        run: |
          set -euxo pipefail
          node --test Scripts/Runtime/Tests/runtime-link-dependencies.test.mjs 2>&1 | tee "$LOG_DIR/04-runtime-link-tests.log"
          python3 -m unittest Scripts/Runtime/Tests/test_validate_app_dyld_closure.py -v 2>&1 | tee "$LOG_DIR/04-dyld-scanner-tests.log"

      - name: Verify pinned application-link archives
        run: |
          set -euxo pipefail
          archive_root="$(mktemp -d "$RUNNER_TEMP/runtime-link-archives.XXXXXX")"
          curl -fL --retry 3 \
            --output "$archive_root/libssh2-dynamic.xcframework.zip" \
            "https://github.com/holzschu/libssh2-apple/releases/download/v1.11.0/libssh2-dynamic.xcframework.zip"
          curl -fL --retry 3 \
            --output "$archive_root/openssl-dynamic.xcframework.zip" \
            "https://github.com/holzschu/openssl-apple/releases/download/v1.1.1w/openssl-dynamic.xcframework.zip"
          test "$(stat -f %z "$archive_root/libssh2-dynamic.xcframework.zip")" = "6378994"
          test "$(stat -f %z "$archive_root/openssl-dynamic.xcframework.zip")" = "13879626"
          test "$(swift package compute-checksum "$archive_root/libssh2-dynamic.xcframework.zip")" = "cacfe1789b197b727119f7e32f561eaf9acc27bf38cd19975b74fce107f868a6"
          test "$(swift package compute-checksum "$archive_root/openssl-dynamic.xcframework.zip")" = "329e8317cf9bee8e138da5d032330a7a1bd2473cf44c9c083cb2f0636abb8b80"

      - name: Validate expected project files
        run: |
          set -euxo pipefail

          {
            echo "Validating expected project structure..."

            test -d "$PROJECT_PATH"
            test -f "$PROJECT_PATH/project.pbxproj"
            test -d "AI_HLY"
            test -f "AI_HLY/AI_HLY.swift"
            test -f "AI_HLY/AI_HLY.entitlements"
            test -f "AI-HLY-Info.plist"
            test -f "Config.xcconfig"
            test -d "Vendor/NodeMobile/NodeMobile.xcframework"
            test -d "Vendor/Python/Python.xcframework"
            test -f "Vendor/Python/Python-VERSIONS"
            test -f "AI_HLY/RuntimeHostResources.zip"
            test -f "AI_HLY/Downstream/RuntimeCore/Resources/RuntimeManifest.json"

            echo
            echo "Required files exist."

            echo
            echo "===== Project directory ====="
            find "$PROJECT_PATH" -maxdepth 4 -type f | sort

            echo
            echo "===== App source sample ====="
            find AI_HLY -maxdepth 3 -type f | sort | sed -n '1,200p'
          } 2>&1 | tee "$LOG_DIR/04-validate-project.log"

      - name: Inspect Xcode project
        run: |
          set -euxo pipefail

          {
            echo "Running xcodebuild -list..."
            xcodebuild -list -project "$PROJECT_PATH"

            echo
            echo "Checking project settings by scheme..."
            xcodebuild \
              -project "$PROJECT_PATH" \
              -scheme "$SCHEME_NAME" \
              -configuration "$CONFIGURATION" \
              -showBuildSettings \
              IPHONEOS_DEPLOYMENT_TARGET="$IOS_DEPLOYMENT_TARGET" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              | tee "$LOG_DIR/05-build-settings-full.log"

          } 2>&1 | tee "$LOG_DIR/05-inspect-project.log"

      - name: Resolve Swift Package dependencies
        run: |
          set -euxo pipefail

          {
            echo "Resolving Swift Package dependencies..."

            xcodebuild \
              -project "$PROJECT_PATH" \
              -scheme "$SCHEME_NAME" \
              -resolvePackageDependencies \
              -clonedSourcePackagesDirPath "$CLONED_PACKAGES_PATH" \
              -skipPackagePluginValidation \
              -skipMacroValidation

            echo
            echo "===== Resolved packages folder ====="
            find "$CLONED_PACKAGES_PATH" -maxdepth 4 -type d | sort | sed -n '1,300p' || true

            echo
            echo "Swift Package dependency resolution completed."
          } 2>&1 | tee "$LOG_DIR/06-resolve-packages.log"

      - name: Build unsigned iOS 26 app
        run: |
          set -euxo pipefail

          {
            echo "Starting unsigned iOS build..."
            echo "Project: $PROJECT_PATH"
            echo "Scheme: $SCHEME_NAME"
            echo "App name: $APP_NAME"
            echo "Configuration: $CONFIGURATION"
            echo "Deployment target override: iOS $IOS_DEPLOYMENT_TARGET"
            echo "DerivedData: $DERIVED_DATA_PATH"
            echo "Packages: $CLONED_PACKAGES_PATH"
            echo

            rm -rf "$LOG_DIR/BuildResult.xcresult"

            xcodebuild \
              -project "$PROJECT_PATH" \
              -scheme "$SCHEME_NAME" \
              -configuration "$CONFIGURATION" \
              -sdk iphoneos \
              -destination "generic/platform=iOS" \
              -derivedDataPath "$DERIVED_DATA_PATH" \
              -clonedSourcePackagesDirPath "$CLONED_PACKAGES_PATH" \
              -resultBundlePath "$LOG_DIR/BuildResult.xcresult" \
              -skipPackagePluginValidation \
              -skipMacroValidation \
              IPHONEOS_DEPLOYMENT_TARGET="$IOS_DEPLOYMENT_TARGET" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              PROVISIONING_PROFILE_SPECIFIER="" \
              DEVELOPMENT_TEAM="" \
              clean build 2>&1 | tee "$LOG_DIR/07-xcodebuild.raw.log"

            echo
            echo "Build command completed."
          } 2>&1 | tee "$LOG_DIR/07-build-step-wrapper.log"

      - name: Locate built app
        run: |
          set -euxo pipefail

          {
            echo "Searching for built .app products..."

            find "$DERIVED_DATA_PATH" -name "*.app" -type d -print | sort | tee "$LOG_DIR/08-found-apps.txt"

            APP_PATH="$(find "$DERIVED_DATA_PATH/Build/Products" -path "*Release-iphoneos/*.app" -type d -print -quit || true)"

            if [ -z "$APP_PATH" ]; then
              echo "ERROR: No Release-iphoneos .app found."
              echo
              echo "Directory dump:"
              find "$DERIVED_DATA_PATH/Build/Products" -maxdepth 5 -print || true
              exit 1
            fi

            echo "$APP_PATH" > "$LOG_DIR/app-path.txt"

            echo
            echo "Selected app path:"
            cat "$LOG_DIR/app-path.txt"

            echo
            echo "===== App bundle contents ====="
            find "$APP_PATH" -maxdepth 3 -print | sort | sed -n '1,400p'

            echo
            echo "===== RuntimeCore payload verification ====="
            test -f "$APP_PATH/Frameworks/NodeMobile.framework/NodeMobile"
            test -f "$APP_PATH/Frameworks/Python.framework/Python"
            test -d "$APP_PATH/python/lib/python3.14"
            test -f "$APP_PATH/RuntimeHostResources.zip"
            test -f "$APP_PATH/RuntimeManifest.json"
            test -f "$APP_PATH/RuntimeLinkDependencyNotices.txt"
            nm "$APP_PATH/$APP_NAME" | grep -E '(_ios_system$|_HanlinPythonExecute$|_HanlinNodeStart$)' | tee "$LOG_DIR/08-runtime-symbols.txt"

            echo
            echo "===== ios_system root resource verification ====="
            test -f "$APP_PATH/commandDictionary.plist"
            test -f "$APP_PATH/extraCommandsDictionary.plist"
            plutil -lint "$APP_PATH/commandDictionary.plist"
            plutil -lint "$APP_PATH/extraCommandsDictionary.plist"
            python3 Scripts/Runtime/validate_ios_system_resources.py \
              --repository-root . \
              --app "$APP_PATH" \
              --json-output "$LOG_DIR/08-ios-system-resources.json"
            cp "$APP_PATH/commandDictionary.plist" "$LOG_DIR/commandDictionary.plist"
            cp "$APP_PATH/extraCommandsDictionary.plist" "$LOG_DIR/extraCommandsDictionary.plist"

            echo
            echo "===== Complete Mach-O / dyld closure verification ====="
            test -f "$APP_PATH/Frameworks/libssh2.framework/libssh2"
            test -f "$APP_PATH/Frameworks/openssl.framework/openssl"
            test -f "$APP_PATH/Frameworks/curl_ios.framework/curl_ios"
            plutil -lint "$APP_PATH/Frameworks/libssh2.framework/Info.plist"
            plutil -lint "$APP_PATH/Frameworks/openssl.framework/Info.plist"
            test "$(/usr/libexec/PlistBuddy -c 'Print CFBundleExecutable' "$APP_PATH/Frameworks/libssh2.framework/Info.plist")" = "libssh2"
            test "$(/usr/libexec/PlistBuddy -c 'Print CFBundleExecutable' "$APP_PATH/Frameworks/openssl.framework/Info.plist")" = "openssl"
            lipo -archs "$APP_PATH/Frameworks/libssh2.framework/libssh2" | grep -qw arm64
            lipo -archs "$APP_PATH/Frameworks/openssl.framework/openssl" | grep -qw arm64
            vtool -show-build "$APP_PATH/Frameworks/libssh2.framework/libssh2" | tee "$LOG_DIR/08-libssh2-build-version.txt"
            vtool -show-build "$APP_PATH/Frameworks/openssl.framework/openssl" | tee "$LOG_DIR/08-openssl-build-version.txt"
            grep -Eq 'platform[[:space:]]+IOS$' "$LOG_DIR/08-libssh2-build-version.txt"
            grep -Eq 'platform[[:space:]]+IOS$' "$LOG_DIR/08-openssl-build-version.txt"
            otool -L "$APP_PATH/Frameworks/curl_ios.framework/curl_ios" | tee "$LOG_DIR/08-curl-ios-dependencies.txt"
            grep -Fq '@rpath/libssh2.framework/libssh2' "$LOG_DIR/08-curl-ios-dependencies.txt"
            grep -Fq '@rpath/openssl.framework/openssl' "$LOG_DIR/08-curl-ios-dependencies.txt"
            python3 Scripts/Runtime/validate-app-dyld-closure.py \
              --app "$APP_PATH" \
              --platform iphoneos \
              --json-output "$LOG_DIR/08-dyld-closure.json" \
              --text-output "$LOG_DIR/08-dyld-closure.txt"

            echo
            echo "===== App Info.plist ====="
            /usr/libexec/PlistBuddy -c "Print" "$APP_PATH/Info.plist" || true

            echo
            echo "===== Bundle metadata ====="
            echo "CFBundleIdentifier:"
            /usr/libexec/PlistBuddy -c "Print CFBundleIdentifier" "$APP_PATH/Info.plist" || true

            echo "CFBundleShortVersionString:"
            /usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "$APP_PATH/Info.plist" || true

            echo "CFBundleVersion:"
            /usr/libexec/PlistBuddy -c "Print CFBundleVersion" "$APP_PATH/Info.plist" || true

            echo "MinimumOSVersion:"
            /usr/libexec/PlistBuddy -c "Print MinimumOSVersion" "$APP_PATH/Info.plist" || true

          } 2>&1 | tee "$LOG_DIR/08-locate-app.log"

      - name: Package unsigned IPA
        run: |
          set -euxo pipefail

          {
            APP_PATH="$(cat "$LOG_DIR/app-path.txt")"

            echo "Packaging unsigned IPA..."
            echo "App path: $APP_PATH"

            rm -rf Payload
            mkdir -p Payload

            cp -R "$APP_PATH" Payload/

            echo
            echo "===== Payload contents ====="
            find Payload -maxdepth 4 -print | sort | sed -n '1,400p'

            echo
            echo "Creating IPA: $IPA_NAME"
            /usr/bin/zip -qry "$IPA_NAME" Payload

            echo
            echo "===== IPA file ====="
            ls -lh "$IPA_NAME"

            echo
            echo "===== IPA zip listing sample ====="
            unzip -l "$IPA_NAME" | sed -n '1,200p'

            echo
            echo "Unsigned IPA packaged successfully."
          } 2>&1 | tee "$LOG_DIR/09-package-ipa.log"

      - name: Validate packaged IPA dyld closure
        run: |
          set -euxo pipefail
          packaged_root="$(mktemp -d "$RUNNER_TEMP/packaged-ipa.XXXXXX")"
          ditto -x -k "$IPA_NAME" "$packaged_root"
          PACKAGED_APP_PATH="$(find "$packaged_root/Payload" -maxdepth 1 -type d -name '*.app' -print -quit)"
          test -n "$PACKAGED_APP_PATH"
          python3 Scripts/Runtime/validate-app-dyld-closure.py \
            --app "$PACKAGED_APP_PATH" \
            --platform iphoneos \
            --json-output "$LOG_DIR/09-packaged-ipa-dyld-closure.json" \
            --text-output "$LOG_DIR/09-packaged-ipa-dyld-closure.txt"
          test -f "$PACKAGED_APP_PATH/commandDictionary.plist"
          test -f "$PACKAGED_APP_PATH/extraCommandsDictionary.plist"
          plutil -lint "$PACKAGED_APP_PATH/commandDictionary.plist"
          plutil -lint "$PACKAGED_APP_PATH/extraCommandsDictionary.plist"
          python3 Scripts/Runtime/validate_ios_system_resources.py \
            --repository-root . \
            --app "$PACKAGED_APP_PATH" \
            --json-output "$LOG_DIR/09-packaged-ios-system-resources.json"
          SOURCE_APP_PATH="$(cat "$LOG_DIR/app-path.txt")"
          test "$(shasum -a 256 "$SOURCE_APP_PATH/commandDictionary.plist" | awk '{print $1}')" \
            = "$(shasum -a 256 "$PACKAGED_APP_PATH/commandDictionary.plist" | awk '{print $1}')"
          test "$(shasum -a 256 "$SOURCE_APP_PATH/extraCommandsDictionary.plist" | awk '{print $1}')" \
            = "$(shasum -a 256 "$PACKAGED_APP_PATH/extraCommandsDictionary.plist" | awk '{print $1}')"
          stat -f %z "$IPA_NAME" | tee "$LOG_DIR/09-ipa-size-bytes.txt"
          shasum -a 256 "$IPA_NAME" | tee "$LOG_DIR/09-ipa-sha256.txt"

      - name: Create diagnostic summary
        if: always()
        run: |
          set +e

          SUMMARY_FILE="$LOG_DIR/00-summary.txt"

          {
            echo "===== Build diagnostic summary ====="
            echo "Date: $(date)"
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Commit: $GITHUB_SHA"
            echo "Runner OS: $RUNNER_OS"
            echo "Runner name: $RUNNER_NAME"

            echo
            echo "===== Selected Xcode ====="
            xcode-select -p
            xcodebuild -version

            echo
            echo "===== SDKs ====="
            xcodebuild -showsdks

            echo
            echo "===== Project ====="
            echo "PROJECT_PATH=$PROJECT_PATH"
            echo "SCHEME_NAME=$SCHEME_NAME"
            echo "APP_NAME=$APP_NAME"
            echo "CONFIGURATION=$CONFIGURATION"
            echo "IOS_DEPLOYMENT_TARGET=$IOS_DEPLOYMENT_TARGET"

            echo
            echo "===== IPA ====="
            if [ -f "$IPA_NAME" ]; then
              ls -lh "$IPA_NAME"
              echo "Size (bytes): $(cat "$LOG_DIR/09-ipa-size-bytes.txt" 2>/dev/null || echo unavailable)"
              echo "SHA-256: $(cat "$LOG_DIR/09-ipa-sha256.txt" 2>/dev/null || echo unavailable)"
            else
              echo "IPA was not created."
            fi

            echo
            echo "===== Found apps ====="
            cat "$LOG_DIR/08-found-apps.txt" 2>/dev/null || echo "No found-apps file."

            echo
            echo "===== Last 200 lines of raw xcodebuild log ====="
            tail -200 "$LOG_DIR/07-xcodebuild.raw.log" 2>/dev/null || echo "No raw xcodebuild log."

          } > "$SUMMARY_FILE" 2>&1

          cat "$SUMMARY_FILE"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI_Hanlin-iOS26-unsigned-ipa
          path: AI_Hanlin-iOS26-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload build logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AI_Hanlin-iOS26-build-logs
          path: |
            build-logs
          if-no-files-found: warn
          retention-days: 14

  full-app-simulator-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && !inputs.runtime_bundle_only && !inputs.phase1_validation_only }}
    name: Launch full app on iPad Simulator
    runs-on: macos-26
    timeout-minutes: 90

    env:
      PROJECT_PATH: AI_HLY.xcodeproj
      SCHEME_NAME: AI_HLY
      CONFIGURATION: Release
      DERIVED_DATA_PATH: build/SimulatorDerivedData
      CLONED_PACKAGES_PATH: build/SimulatorSourcePackages
      LOG_DIR: simulator-logs
      IOS_DEPLOYMENT_TARGET: "26.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pinned RuntimeCore host Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.5.0
          cache: npm
          cache-dependency-path: AI_HLY/Downstream/RuntimeCore/Node/Host/package-lock.json

      - name: Prepare simulator logs and select stable Xcode 26
        run: |
          set -euxo pipefail
          mkdir -p "$LOG_DIR" build
          selected_xcode="$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' -print \
            | grep -E '/Xcode_26([._][0-9]+)*\.app$' \
            | sort -V \
            | tail -1)"
          test -n "$selected_xcode"
          sudo xcode-select -s "$selected_xcode/Contents/Developer"
          {
            sw_vers
            xcode-select -p
            xcodebuild -version
            xcodebuild -showsdks
          } 2>&1 | tee "$LOG_DIR/01-environment.log"
          xcodebuild -showsdks | grep -E 'iphonesimulator26|iOS Simulator 26'

      - name: Create CI Config.xcconfig
        run: |
          set -euxo pipefail
          cat > Config.xcconfig <<'EOF'
          // Generated by GitHub Actions for CI builds.
          // Do not commit secrets here.

          HANLIN_API_KEY =
          HANLIN_OPEN_API_KEY =
          EOF

      - name: Prepare verified embedded RuntimeCore
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          bash Scripts/Runtime/prepare-runtime-core.sh 2>&1 | tee "$LOG_DIR/02-prepare-runtime-core.log"
          grep -Fq "Prepared verified RuntimeCore 7d967563db0809a4efa0f07b75d6b5928379a3b6f3aafb886899a79f59512a93" "$LOG_DIR/02-prepare-runtime-core.log"

      - name: Package current RuntimeCore host resources
        run: |
          set -euxo pipefail
          bash Scripts/Runtime/prepare-runtime-host.sh 2>&1 | tee "$LOG_DIR/03-package-runtime-host.log"
          cp build/runtime-host/RuntimeHostResources.zip AI_HLY/RuntimeHostResources.zip

      - name: Run RuntimeCore preflight
        run: |
          set -euxo pipefail
          bash Scripts/Runtime/preflight-runtime-core.sh 2>&1 | tee "$LOG_DIR/04-runtime-preflight.log"

      - name: Resolve Swift Package dependencies
        run: |
          set -euxo pipefail
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME_NAME" \
            -resolvePackageDependencies \
            -clonedSourcePackagesDirPath "$CLONED_PACKAGES_PATH" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            2>&1 | tee "$LOG_DIR/05-resolve-packages.log"

      - name: Build full arm64 simulator app
        run: |
          set -euxo pipefail
          rm -rf "$LOG_DIR/SimulatorBuildResult.xcresult"
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration "$CONFIGURATION" \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -clonedSourcePackagesDirPath "$CLONED_PACKAGES_PATH" \
            -resultBundlePath "$LOG_DIR/SimulatorBuildResult.xcresult" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            IPHONEOS_DEPLOYMENT_TARGET="$IOS_DEPLOYMENT_TARGET" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            clean build 2>&1 | tee "$LOG_DIR/06-xcodebuild-simulator.log"

      - name: Locate and scan simulator app
        run: |
          set -euxo pipefail
          APP_PATH="$(find "$DERIVED_DATA_PATH/Build/Products" -path '*Release-iphonesimulator/*.app' -type d -print -quit)"
          test -n "$APP_PATH"
          echo "$APP_PATH" > "$LOG_DIR/app-path.txt"
          test -f "$APP_PATH/Frameworks/libssh2.framework/libssh2"
          test -f "$APP_PATH/Frameworks/openssl.framework/openssl"
          test -f "$APP_PATH/Frameworks/curl_ios.framework/curl_ios"
          test -f "$APP_PATH/commandDictionary.plist"
          test -f "$APP_PATH/extraCommandsDictionary.plist"
          plutil -lint "$APP_PATH/commandDictionary.plist"
          plutil -lint "$APP_PATH/extraCommandsDictionary.plist"
          python3 Scripts/Runtime/validate_ios_system_resources.py \
            --repository-root . \
            --app "$APP_PATH" \
            --json-output "$LOG_DIR/07-simulator-ios-system-resources.json"
          cp "$APP_PATH/commandDictionary.plist" "$LOG_DIR/commandDictionary.plist"
          cp "$APP_PATH/extraCommandsDictionary.plist" "$LOG_DIR/extraCommandsDictionary.plist"
          find "$APP_PATH" -maxdepth 4 -print | sort > "$LOG_DIR/07-built-app-resources.txt"
          python3 Scripts/Runtime/validate-app-dyld-closure.py \
            --app "$APP_PATH" \
            --platform iphonesimulator \
            --json-output "$LOG_DIR/07-simulator-dyld-closure.json" \
            --text-output "$LOG_DIR/07-simulator-dyld-closure.txt"

      - name: Boot iPad Simulator and launch full app
        run: |
          set -euxo pipefail
          APP_PATH="$(cat "$LOG_DIR/app-path.txt")"
          BUNDLE_ID="$(/usr/libexec/PlistBuddy -c 'Print CFBundleIdentifier' "$APP_PATH/Info.plist")"
          APP_EXECUTABLE="$(/usr/libexec/PlistBuddy -c 'Print CFBundleExecutable' "$APP_PATH/Info.plist")"
          selection="$(python3 - <<'PY'
          import json
          import subprocess

          payload = json.loads(subprocess.check_output(
              ["xcrun", "simctl", "list", "devices", "available", "--json"],
              text=True,
          ))
          candidates = []
          for runtime, devices in payload.get("devices", {}).items():
              if "iOS-26" not in runtime:
                  continue
              for device in devices:
                  if device.get("isAvailable") and "iPad" in device.get("name", ""):
                      candidates.append((runtime, device["name"], device["udid"]))
          if not candidates:
              raise SystemExit("No available iOS 26 iPad simulator was found")
          runtime, name, udid = sorted(candidates, reverse=True)[0]
          print(f"{udid}\t{name}\t{runtime}")
          PY
          )"
          IFS=$'\t' read -r SIMULATOR_UDID SIMULATOR_MODEL SIMULATOR_RUNTIME <<< "$selection"
          test -n "$SIMULATOR_UDID"
          printf '%s\n' "$SIMULATOR_UDID" > "$LOG_DIR/simulator-udid.txt"
          printf '%s\n' "$SIMULATOR_MODEL" > "$LOG_DIR/simulator-model.txt"
          printf '%s\n' "$SIMULATOR_RUNTIME" > "$LOG_DIR/simulator-runtime.txt"
          printf '%s\n' "$BUNDLE_ID" > "$LOG_DIR/bundle-id.txt"
          printf '%s\n' "$APP_EXECUTABLE" > "$LOG_DIR/app-executable.txt"

          xcrun simctl boot "$SIMULATOR_UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b 2>&1 | tee "$LOG_DIR/08-bootstatus.log"
          xcrun simctl uninstall "$SIMULATOR_UDID" "$BUNDLE_ID" 2>/dev/null || true
          xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"
          touch "$LOG_DIR/launch-marker"

          cleanup() {
            xcrun simctl terminate "$SIMULATOR_UDID" "$BUNDLE_ID" 2>/dev/null || true
          }
          trap cleanup EXIT

          set +e
          SIMCTL_CHILD_HANLIN_RUNTIME_ACCEPTANCE=shell \
            xcrun simctl launch "$SIMULATOR_UDID" "$BUNDLE_ID" 2>&1 | tee "$LOG_DIR/08-launch-output.txt"
          launch_status=${PIPESTATUS[0]}
          set -e
          test "$launch_status" -eq 0
          APP_PID="$(awk -F ': ' -v bundle="$BUNDLE_ID" '$1 == bundle { print $2 }' "$LOG_DIR/08-launch-output.txt" | tail -1)"
          test -n "$APP_PID"
          printf '%s\n' "$APP_PID" > "$LOG_DIR/launch-pid.txt"
          LAUNCH_EPOCH="$(date +%s)"
          DATA_CONTAINER="$(xcrun simctl get_app_container "$SIMULATOR_UDID" "$BUNDLE_ID" data)"
          ACCEPTANCE_PATH="$DATA_CONTAINER/Library/Application Support/HanlinRuntime/v1/logs/shell-acceptance.json"
          SHELL_LOG_PATH="$DATA_CONTAINER/Library/Application Support/HanlinRuntime/v1/logs/shell-runtime.log"
          for elapsed in $(seq 1 120); do
            if [ -f "$ACCEPTANCE_PATH" ]; then
              break
            fi
            if ! xcrun simctl spawn "$SIMULATOR_UDID" launchctl print "pid/$APP_PID" >/dev/null 2>&1; then
              echo "Full app exited before writing shell acceptance JSON after ${elapsed} seconds." >&2
              exit 1
            fi
            sleep 1
          done
          test -f "$ACCEPTANCE_PATH"
          cp "$ACCEPTANCE_PATH" "$LOG_DIR/shell-acceptance.json"
          test -f "$SHELL_LOG_PATH"
          cp "$SHELL_LOG_PATH" "$LOG_DIR/shell-runtime.log"
          python3 Scripts/Runtime/validate_shell_acceptance.py \
            "$LOG_DIR/shell-acceptance.json" \
            --summary-output "$LOG_DIR/08-shell-acceptance-summary.json" \
            | tee "$LOG_DIR/08-shell-acceptance.log"

          ALIVE_SECONDS="$(( $(date +%s) - LAUNCH_EPOCH ))"
          while [ "$ALIVE_SECONDS" -lt 15 ]; do
            xcrun simctl spawn "$SIMULATOR_UDID" launchctl print "pid/$APP_PID" >/dev/null
            sleep 1
            ALIVE_SECONDS="$(( $(date +%s) - LAUNCH_EPOCH ))"
          done
          xcrun simctl spawn "$SIMULATOR_UDID" launchctl print "pid/$APP_PID" >/dev/null
          printf '%s\n' "$ALIVE_SECONDS" > "$LOG_DIR/alive-duration-seconds.txt"

          xcrun simctl spawn "$SIMULATOR_UDID" log show \
            --style compact \
            --last 5m \
            --predicate "processID == $APP_PID" \
            > "$LOG_DIR/08-application.log" 2>&1 || true

          : > "$LOG_DIR/08-new-diagnostic-reports.txt"
          for diagnostic_root in \
            "$HOME/Library/Logs/DiagnosticReports" \
            "$HOME/Library/Developer/CoreSimulator/Devices/$SIMULATOR_UDID/data/Library/Logs/CrashReporter" \
            "$HOME/Library/Developer/CoreSimulator/Devices/$SIMULATOR_UDID/data/Library/Logs/DiagnosticReports"; do
            if [ -d "$diagnostic_root" ]; then
              find "$diagnostic_root" -type f -newer "$LOG_DIR/launch-marker" -print \
                >> "$LOG_DIR/08-new-diagnostic-reports.txt"
            fi
          done
          while IFS= read -r diagnostic_report; do
            report_name="$(basename "$diagnostic_report")"
            case "$report_name" in
              "$APP_EXECUTABLE"*|"$BUNDLE_ID"*)
                echo "Full app generated crash report: $diagnostic_report" >&2
                exit 1
                ;;
            esac
          done < "$LOG_DIR/08-new-diagnostic-reports.txt"

          xcrun simctl terminate "$SIMULATOR_UDID" "$BUNDLE_ID" 2>/dev/null || true

          MCP_ACCEPTANCE_PATH="$DATA_CONTAINER/Library/Application Support/HanlinRuntime/v1/logs/mcp-acceptance.json"
          MCP_RUNTIME_LOG_PATH="$DATA_CONTAINER/Library/Application Support/HanlinRuntime/v1/logs/node-runtime.log"
          rm -f "$MCP_ACCEPTANCE_PATH"
          touch "$LOG_DIR/mcp-launch-marker"
          set +e
          SIMCTL_CHILD_HANLIN_RUNTIME_ACCEPTANCE=mcp \
            xcrun simctl launch "$SIMULATOR_UDID" "$BUNDLE_ID" 2>&1 | tee "$LOG_DIR/08-mcp-launch-output.txt"
          mcp_launch_status=${PIPESTATUS[0]}
          set -e
          test "$mcp_launch_status" -eq 0
          MCP_APP_PID="$(awk -F ': ' -v bundle="$BUNDLE_ID" '$1 == bundle { print $2 }' "$LOG_DIR/08-mcp-launch-output.txt" | tail -1)"
          test -n "$MCP_APP_PID"
          printf '%s\n' "$MCP_APP_PID" > "$LOG_DIR/mcp-launch-pid.txt"
          for elapsed in $(seq 1 360); do
            if [ -f "$MCP_ACCEPTANCE_PATH" ]; then
              break
            fi
            if ! xcrun simctl spawn "$SIMULATOR_UDID" launchctl print "pid/$MCP_APP_PID" >/dev/null 2>&1; then
              echo "Full app exited before writing MCP acceptance JSON after ${elapsed} seconds." >&2
              exit 1
            fi
            sleep 1
          done
          test -f "$MCP_ACCEPTANCE_PATH"
          cp "$MCP_ACCEPTANCE_PATH" "$LOG_DIR/mcp-acceptance.json"
          test -f "$MCP_RUNTIME_LOG_PATH"
          cp "$MCP_RUNTIME_LOG_PATH" "$LOG_DIR/node-runtime.log"
          COMPATIBILITY_REPORT="$(find "$DATA_CONTAINER/Library/Application Support/HanlinRuntime/v1/packages/mcp" -name compatibility-report.json -type f -print -quit)"
          test -n "$COMPATIBILITY_REPORT"
          cp "$COMPATIBILITY_REPORT" "$LOG_DIR/server-everything-compatibility-report.json"
          python3 Scripts/Runtime/validate_mcp_acceptance.py \
            "$LOG_DIR/mcp-acceptance.json" \
            --summary-output "$LOG_DIR/08-mcp-acceptance-summary.json" \
            | tee "$LOG_DIR/08-mcp-acceptance.log"
          xcrun simctl spawn "$SIMULATOR_UDID" launchctl print "pid/$MCP_APP_PID" >/dev/null
          xcrun simctl terminate "$SIMULATOR_UDID" "$BUNDLE_ID" 2>/dev/null || true

          : > "$LOG_DIR/08-mcp-new-diagnostic-reports.txt"
          for diagnostic_root in \
            "$HOME/Library/Logs/DiagnosticReports" \
            "$HOME/Library/Developer/CoreSimulator/Devices/$SIMULATOR_UDID/data/Library/Logs/CrashReporter" \
            "$HOME/Library/Developer/CoreSimulator/Devices/$SIMULATOR_UDID/data/Library/Logs/DiagnosticReports"; do
            if [ -d "$diagnostic_root" ]; then
              find "$diagnostic_root" -type f -newer "$LOG_DIR/mcp-launch-marker" -print \
                >> "$LOG_DIR/08-mcp-new-diagnostic-reports.txt"
            fi
          done
          while IFS= read -r diagnostic_report; do
            report_name="$(basename "$diagnostic_report")"
            case "$report_name" in
              "$APP_EXECUTABLE"*|"$BUNDLE_ID"*)
                echo "MCP acceptance generated crash report: $diagnostic_report" >&2
                exit 1
                ;;
            esac
          done < "$LOG_DIR/08-mcp-new-diagnostic-reports.txt"
          trap - EXIT

      - name: Collect simulator diagnostics
        if: always()
        run: |
          set +e
          if [ -f "$LOG_DIR/simulator-udid.txt" ]; then
            SIMULATOR_UDID="$(cat "$LOG_DIR/simulator-udid.txt")"
            xcrun simctl spawn "$SIMULATOR_UDID" log show --style compact --last 10m \
              > "$LOG_DIR/09-simulator-system.log" 2>&1 || true
            if [ -f "$LOG_DIR/bundle-id.txt" ]; then
              BUNDLE_ID="$(cat "$LOG_DIR/bundle-id.txt")"
              DATA_CONTAINER="$(xcrun simctl get_app_container "$SIMULATOR_UDID" "$BUNDLE_ID" data 2>/dev/null || true)"
              if [ -n "$DATA_CONTAINER" ]; then
                cp "$DATA_CONTAINER/Library/Application Support/HanlinRuntime/v1/logs/shell-acceptance.json" \
                  "$LOG_DIR/shell-acceptance.json" 2>/dev/null || true
                cp "$DATA_CONTAINER/Library/Application Support/HanlinRuntime/v1/logs/shell-runtime.log" \
                  "$LOG_DIR/shell-runtime.log" 2>/dev/null || true
                cp "$DATA_CONTAINER/Library/Application Support/HanlinRuntime/v1/logs/mcp-acceptance.json" \
                  "$LOG_DIR/mcp-acceptance.json" 2>/dev/null || true
                cp "$DATA_CONTAINER/Library/Application Support/HanlinRuntime/v1/logs/node-runtime.log" \
                  "$LOG_DIR/node-runtime.log" 2>/dev/null || true
                find "$DATA_CONTAINER/Library/Application Support/HanlinRuntime/v1/packages/mcp" \
                  -name compatibility-report.json -type f -exec cp {} "$LOG_DIR/server-everything-compatibility-report.json" \; \
                  2>/dev/null || true
              fi
            fi
            mkdir -p "$LOG_DIR/DiagnosticReports"
            for diagnostic_root in \
              "$HOME/Library/Logs/DiagnosticReports" \
              "$HOME/Library/Developer/CoreSimulator/Devices/$SIMULATOR_UDID/data/Library/Logs/CrashReporter" \
              "$HOME/Library/Developer/CoreSimulator/Devices/$SIMULATOR_UDID/data/Library/Logs/DiagnosticReports"; do
              if [ -d "$diagnostic_root" ]; then
                find "$diagnostic_root" -type f -newer "$LOG_DIR/launch-marker" -exec cp -p {} "$LOG_DIR/DiagnosticReports/" \; 2>/dev/null || true
              fi
            done
          fi

      - name: Upload simulator smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AI_Hanlin-iOS26-simulator-smoke-logs
          path: simulator-logs
          if-no-files-found: error
          retention-days: 14
